services:

  # ── Isaac Sim (합성 데이터 생성기) ────────────────────────────────
  isaac-sim:
    image: nvcr.io/nvidia/isaac-sim:4.5.0
    container_name: datafactory_isaac_sim
    runtime: nvidia
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,graphics,utility
      - DISPLAY=${DISPLAY}
      - ACCEPT_EULA=Y
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:rw
      - ../data:/data                          # 생성된 합성 데이터 출력
      - ../config:/config                      # 카메라 파라미터, 씬 설정
      - isaac_cache:/root/.cache/ov            # 캐시 볼륨 분리 (스토리지 추적용)
    command: ["/bin/bash"]

  # ── ROS2 Humble (검증 노드) ───────────────────────────────────────
  ros2:
    image: ros:humble
    container_name: datafactory_ros2
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      - ROS_DOMAIN_ID=0
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ../data:/data
      - ./ros2_ws:/ros2_ws                     # ROS2 워크스페이스
    command: ["/bin/bash"]

volumes:
  isaac_cache:
    driver: local
